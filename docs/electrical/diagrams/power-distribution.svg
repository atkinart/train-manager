<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="940" viewBox="0 0 1600 940">
  <rect width="1600" height="940" fill="#ffffff"/>
  <text x="40" y="55" font-family="Arial" font-size="34" font-weight="700">POWER DISTRIBUTION (MVP)</text>

  <rect x="60" y="120" width="360" height="170" fill="#fee2e2" stroke="#b91c1c" stroke-width="3"/>
  <text x="80" y="165" font-size="27" font-family="Arial" font-weight="700">Raspberry Pi PSU</text>
  <text x="80" y="205" font-size="22" font-family="Arial">POWER 5V to Raspberry Pi</text>

  <rect x="60" y="340" width="360" height="170" fill="#dbeafe" stroke="#1d4ed8" stroke-width="3"/>
  <text x="80" y="385" font-size="27" font-family="Arial" font-weight="700">Arduino (USB power)</text>
  <text x="80" y="425" font-size="22" font-family="Arial">Provides POWER 3.3V for MFRC522</text>

  <rect x="60" y="560" width="360" height="170" fill="#fef9c3" stroke="#a16207" stroke-width="3"/>
  <text x="80" y="605" font-size="27" font-family="Arial" font-weight="700">External Servo PSU</text>
  <text x="80" y="645" font-size="22" font-family="Arial">POWER 5V for servo only</text>

  <rect x="540" y="120" width="360" height="170" fill="#fee2e2" stroke="#b91c1c" stroke-width="3"/>
  <text x="560" y="165" font-size="27" font-family="Arial" font-weight="700">Raspberry Pi</text>

  <rect x="540" y="340" width="360" height="170" fill="#dbeafe" stroke="#1d4ed8" stroke-width="3"/>
  <text x="560" y="385" font-size="27" font-family="Arial" font-weight="700">Arduino UNO R4</text>

  <rect x="540" y="560" width="360" height="170" fill="#dcfce7" stroke="#15803d" stroke-width="3"/>
  <text x="560" y="605" font-size="27" font-family="Arial" font-weight="700">MFRC522</text>
  <text x="560" y="645" font-size="22" font-family="Arial">POWER 3.3V</text>

  <rect x="1020" y="340" width="460" height="170" fill="#ffedd5" stroke="#c2410c" stroke-width="3"/>
  <text x="1040" y="385" font-size="27" font-family="Arial" font-weight="700">Servo group (2x or more)</text>
  <text x="1040" y="425" font-size="22" font-family="Arial">POWER 5V from external PSU</text>

  <line x1="420" y1="205" x2="540" y2="205" stroke="#dc2626" stroke-width="5"/>
  <text x="430" y="190" font-size="18" font-family="Arial">POWER 5V</text>

  <line x1="420" y1="425" x2="540" y2="425" stroke="#2563eb" stroke-width="5"/>
  <text x="435" y="410" font-size="18" font-family="Arial">USB power</text>

  <line x1="420" y1="645" x2="1020" y2="425" stroke="#dc2626" stroke-width="5"/>
  <text x="730" y="520" font-size="18" font-family="Arial">POWER 5V to servo rail</text>

  <line x1="700" y1="510" x2="700" y2="560" stroke="#7c3aed" stroke-width="5"/>
  <text x="715" y="540" font-size="18" font-family="Arial">POWER 3.3V</text>

  <line x1="200" y1="730" x2="200" y2="840" stroke="#111827" stroke-width="6"/>
  <line x1="200" y1="840" x2="1450" y2="840" stroke="#111827" stroke-width="6"/>
  <line x1="700" y1="510" x2="700" y2="840" stroke="#111827" stroke-width="6"/>
  <line x1="1250" y1="510" x2="1250" y2="840" stroke="#111827" stroke-width="6"/>
  <line x1="700" y1="290" x2="700" y2="840" stroke="#111827" stroke-width="6"/>
  <text x="760" y="825" font-size="28" font-family="Arial" font-weight="700">COMMON GND</text>

  <text x="60" y="900" font-size="24" font-family="Arial" fill="#b91c1c" font-weight="700">WARNING: Do NOT power multiple servo from Arduino 5V pin.</text>
</svg>
