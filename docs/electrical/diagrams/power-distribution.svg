<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="920" viewBox="0 0 1300 920">
  <rect width="1300" height="920" fill="#f8fafc"/>
  <text x="40" y="60" font-size="34" font-family="Arial" font-weight="700">Power distribution (Pico 2 W MVP)</text>

  <rect x="70" y="150" width="330" height="180" rx="16" fill="#dbeafe" stroke="#1d4ed8" stroke-width="3"/>
  <text x="95" y="215" font-size="30" font-family="Arial" font-weight="700">Pico 2 W</text>
  <text x="95" y="255" font-size="22" font-family="Arial">3.3V logic domain</text>

  <rect x="500" y="150" width="320" height="180" rx="16" fill="#dcfce7" stroke="#166534" stroke-width="3"/>
  <text x="560" y="215" font-size="30" font-family="Arial" font-weight="700">MFRC522</text>
  <text x="560" y="255" font-size="22" font-family="Arial">3.3V from Pico</text>

  <rect x="930" y="130" width="300" height="220" rx="16" fill="#e0f2fe" stroke="#0369a1" stroke-width="3"/>
  <text x="970" y="205" font-size="30" font-family="Arial" font-weight="700">External 5V PSU</text>
  <text x="970" y="245" font-size="22" font-family="Arial">Servo power</text>

  <rect x="500" y="480" width="320" height="160" rx="16" fill="#fee2e2" stroke="#b91c1c" stroke-width="3"/>
  <text x="560" y="550" font-size="30" font-family="Arial" font-weight="700">2x Servo</text>

  <line x1="400" y1="230" x2="500" y2="230" stroke="#111827" stroke-width="4"/>
  <text x="410" y="215" font-size="18" font-family="Arial">3.3V + GND</text>

  <line x1="930" y1="250" x2="820" y2="550" stroke="#b91c1c" stroke-width="4"/>
  <text x="840" y="410" font-size="18" font-family="Arial" fill="#b91c1c">+5V to servo V+</text>

  <line x1="960" y1="320" x2="260" y2="320" stroke="#0f172a" stroke-width="5"/>
  <line x1="260" y1="320" x2="260" y2="330" stroke="#0f172a" stroke-width="5"/>
  <line x1="260" y1="330" x2="660" y2="480" stroke="#0f172a" stroke-width="5"/>
  <text x="480" y="360" font-size="22" font-family="Arial" font-weight="700">COMMON GND</text>

  <text x="70" y="840" font-size="24" font-family="Arial" fill="#b91c1c" font-weight="700">WARNING: Do NOT power servo from Pico.</text>
  <text x="70" y="875" font-size="24" font-family="Arial" fill="#b91c1c" font-weight="700">WARNING: Do NOT apply 5V logic to Pico GPIO.</text>
</svg>
