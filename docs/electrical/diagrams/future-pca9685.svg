<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="760" viewBox="0 0 1300 760">
  <rect width="1300" height="760" fill="#f8fafc"/>
  <text x="40" y="55" font-size="34" font-family="Arial" font-weight="700">Future expansion: Pico 2 W + PCA9685 + many Servo</text>

  <rect x="80" y="160" width="320" height="190" rx="16" fill="#dbeafe" stroke="#1d4ed8" stroke-width="3"/>
  <text x="120" y="230" font-size="30" font-family="Arial" font-weight="700">Pico 2 W</text>
  <text x="120" y="270" font-size="22" font-family="Arial">I2C control</text>

  <rect x="520" y="160" width="320" height="210" rx="16" fill="#dcfce7" stroke="#166534" stroke-width="3"/>
  <text x="595" y="235" font-size="30" font-family="Arial" font-weight="700">PCA9685</text>
  <text x="560" y="275" font-size="22" font-family="Arial">PWM expander</text>

  <rect x="960" y="130" width="260" height="220" rx="16" fill="#e0f2fe" stroke="#0369a1" stroke-width="3"/>
