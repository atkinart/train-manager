<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <rect width="1600" height="980" fill="#f9fafb"/>
  <text x="40" y="50" font-size="34" font-family="Arial" font-weight="700">MVP NODE WIRING (Arduino + MFRC522 + 2 Servo + Raspberry Pi)</text>

  <rect x="60" y="120" width="420" height="300" fill="#dbeafe" stroke="#1d4ed8" stroke-width="3"/>
  <text x="80" y="160" font-size="28" font-family="Arial" font-weight="700">Arduino UNO R4</text>
  <text x="80" y="200" font-size="22" font-family="Arial">SPI BUS: D13 SCK / D11 MOSI / D12 MISO</text>
  <text x="80" y="235" font-size="22" font-family="Arial">CS: D10   RST: D9</text>
  <text x="80" y="270" font-size="22" font-family="Arial">servo signal: D5, D6</text>
  <text x="80" y="305" font-size="22" font-family="Arial">POWER 3.3V to MFRC522</text>
  <text x="80" y="340" font-size="22" font-family="Arial">COMMON GND to all devices</text>

  <rect x="620" y="120" width="360" height="260" fill="#dcfce7" stroke="#15803d" stroke-width="3"/>
  <text x="640" y="160" font-size="28" font-family="Arial" font-weight="700">MFRC522 RFID</text>
  <text x="640" y="200" font-size="22" font-family="Arial">POWER 3.3V</text>
  <text x="640" y="235" font-size="22" font-family="Arial">SPI BUS + CS + RST</text>
  <text x="640" y="270" font-size="22" font-family="Arial">COMMON GND</text>
  <text x="640" y="305" font-size="22" font-family="Arial" fill="#b91c1c">WARNING: do NOT feed 5V</text>

  <rect x="1120" y="120" width="420" height="230" fill="#fee2e2" stroke="#b91c1c" stroke-width="3"/>
  <text x="1140" y="160" font-size="28" font-family="Arial" font-weight="700">Raspberry Pi</text>
  <text x="1140" y="200" font-size="22" font-family="Arial">USB SERIAL to Arduino</text>
  <text x="1140" y="235" font-size="22" font-family="Arial">Own Raspberry Pi PSU</text>

  <rect x="620" y="470" width="360" height="190" fill="#ffedd5" stroke="#c2410c" stroke-width="3"/>
  <text x="640" y="510" font-size="28" font-family="Arial" font-weight="700">Servo #1</text>
  <text x="640" y="545" font-size="22" font-family="Arial">POWER 5V + GND from external PSU</text>
  <text x="640" y="580" font-size="22" font-family="Arial">servo signal from D5</text>

  <rect x="1020" y="470" width="360" height="190" fill="#ffedd5" stroke="#c2410c" stroke-width="3"/>
  <text x="1040" y="510" font-size="28" font-family="Arial" font-weight="700">Servo #2</text>
  <text x="1040" y="545" font-size="22" font-family="Arial">POWER 5V + GND from external PSU</text>
  <text x="1040" y="580" font-size="22" font-family="Arial">servo signal from D6</text>

  <rect x="60" y="520" width="420" height="220" fill="#fef9c3" stroke="#a16207" stroke-width="3"/>
  <text x="80" y="560" font-size="28" font-family="Arial" font-weight="700">External 5V PSU (servo)</text>
  <text x="80" y="595" font-size="22" font-family="Arial">POWER 5V to both servo</text>
  <text x="80" y="630" font-size="22" font-family="Arial">COMMON GND to Arduino GND</text>

  <line x1="480" y1="210" x2="620" y2="210" stroke="#0f766e" stroke-width="4"/>
  <text x="500" y="195" font-size="18" font-family="Arial">SPI BUS</text>

  <line x1="480" y1="300" x2="620" y2="300" stroke="#7c3aed" stroke-width="4"/>
  <text x="500" y="285" font-size="18" font-family="Arial">POWER 3.3V</text>

  <line x1="980" y1="550" x2="1020" y2="550" stroke="#2563eb" stroke-width="4"/>
  <line x1="480" y1="560" x2="620" y2="560" stroke="#2563eb" stroke-width="4"/>
  <text x="505" y="540" font-size="18" font-family="Arial">servo signal</text>

  <line x1="260" y1="520" x2="260" y2="420" stroke="#dc2626" stroke-width="5"/>
  <line x1="260" y1="420" x2="800" y2="420" stroke="#dc2626" stroke-width="5"/>
  <line x1="800" y1="420" x2="800" y2="470" stroke="#dc2626" stroke-width="5"/>
  <line x1="800" y1="420" x2="1200" y2="470" stroke="#dc2626" stroke-width="5"/>
  <text x="820" y="410" font-size="18" font-family="Arial">POWER 5V</text>

  <line x1="260" y1="740" x2="260" y2="820" stroke="#111827" stroke-width="5"/>
  <line x1="260" y1="820" x2="1450" y2="820" stroke="#111827" stroke-width="5"/>
  <line x1="1450" y1="820" x2="1450" y2="350" stroke="#111827" stroke-width="5"/>
  <line x1="1450" y1="350" x2="480" y2="350" stroke="#111827" stroke-width="5"/>
  <line x1="900" y1="380" x2="900" y2="820" stroke="#111827" stroke-width="5"/>
  <text x="620" y="805" font-size="24" font-family="Arial" font-weight="700">COMMON GND</text>

  <line x1="480" y1="150" x2="1120" y2="150" stroke="#1d4ed8" stroke-width="5"/>
  <text x="760" y="135" font-size="22" font-family="Arial" font-weight="700">USB SERIAL</text>

  <text x="60" y="920" font-size="24" font-family="Arial" fill="#b91c1c" font-weight="700">WARNING: Do NOT power servo from Arduino 5V pin.</text>
</svg>
