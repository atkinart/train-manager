<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="700" viewBox="0 0 1400 700">
  <rect width="1400" height="700" fill="#f8fafc"/>
  <text x="40" y="55" font-size="34" font-family="Arial" font-weight="700">Arduino ↔ Raspberry Pi: USB SERIAL (recommended for beginners)</text>

  <rect x="100" y="170" width="460" height="250" fill="#dbeafe" stroke="#1d4ed8" stroke-width="3"/>
  <text x="130" y="220" font-size="30" font-family="Arial" font-weight="700">Arduino UNO R4</text>
  <text x="130" y="265" font-size="24" font-family="Arial">USB port</text>
  <text x="130" y="300" font-size="24" font-family="Arial">Node firmware + serial protocol</text>

  <rect x="830" y="170" width="460" height="250" fill="#fee2e2" stroke="#b91c1c" stroke-width="3"/>
  <text x="860" y="220" font-size="30" font-family="Arial" font-weight="700">Raspberry Pi</text>
  <text x="860" y="265" font-size="24" font-family="Arial">USB host port</text>
  <text x="860" y="300" font-size="24" font-family="Arial">MQTT bridge / controller</text>

  <line x1="560" y1="250" x2="830" y2="250" stroke="#1d4ed8" stroke-width="7"/>
  <polygon points="830,250 805,238 805,262" fill="#1d4ed8"/>
  <text x="620" y="230" font-size="26" font-family="Arial" font-weight="700">USB SERIAL</text>

  <rect x="830" y="470" width="460" height="120" fill="#fef9c3" stroke="#a16207" stroke-width="3"/>
  <text x="860" y="520" font-size="26" font-family="Arial" font-weight="700">Raspberry Pi PSU (separate power)</text>

  <rect x="100" y="470" width="460" height="120" fill="#e2e8f0" stroke="#334155" stroke-width="3"/>
  <text x="130" y="520" font-size="26" font-family="Arial" font-weight="700">Arduino may receive power via USB cable</text>

  <text x="40" y="650" font-size="24" font-family="Arial" fill="#b91c1c" font-weight="700">WARNING: direct TX/RX UART is NOT recommended for beginners without level shifting knowledge.</text>
</svg>
